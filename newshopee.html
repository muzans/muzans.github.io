<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Muzans Shop - 3 Column Grid</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, sans-serif; }
        body { background: #f4f4f4; display: flex; flex-direction: column; align-items: center; }

        /* --- TOOLBAR --- */
        .toolbar {
            width: 100%; background: #fff; padding: 10px 15px;
            display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1); position: sticky; top: 0; z-index: 1000;
        }

        .login-popup {
            display: none; position: absolute; top: 55px; right: 15px;
            background: white; padding: 15px; border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2); width: 250px; 
            flex-direction: column; gap: 8px; z-index: 1001;
        }
        .login-popup input { padding: 10px; border: 1px solid #ddd; border-radius: 8px; }
        .rem-box { display: flex; align-items: center; gap: 5px; font-size: 12px; color: #666; cursor: pointer; }

        /* --- ADMIN PANEL --- */
        #admin-panel {
            background: white; padding: 15px; border-radius: 12px; margin: 15px 0;
            width: 95%; max-width: 500px; display: none; box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
        .admin-input { width: 100%; padding: 10px; margin: 5px 0; border: 1px solid #eee; border-radius: 8px; background: #f9f9f9; font-size: 14px; }
        .btn-add { background: #ee4d2d; color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold; }

        /* --- 3 COLUMN GRID --- */
        .container { width: 100%; max-width: 1000px; padding: 8px; }
        .menu-list { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); /* Tetap 3 Kolom */
            gap: 6px; 
        }

        .product-card {
            background: white; border-radius: 8px; overflow: hidden;
            box-shadow: 0 1px 4px rgba(0,0,0,0.1); display: flex;
            flex-direction: column; position: relative; border: 1px solid #efefef;
        }

        .img-container { width: 100%; aspect-ratio: 1 / 1; background: #fff; position: relative; }
        .img-container img { width: 100%; height: 100%; object-fit: cover; }

        .product-info { padding: 6px; flex-grow: 1; display: flex; flex-direction: column; justify-content: space-between; }
        .product-name { 
            font-size: 0.7rem; font-weight: 500; color: #333; line-height: 1.2;
            display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
            overflow: hidden; margin-bottom: 4px; min-height: 2.4em;
        }
        .product-price { color: #ee4d2d; font-size: 0.8rem; font-weight: 700; margin-bottom: 5px; }
        
        .btn-buy {
            background: #ee4d2d; color: white; text-decoration: none;
            text-align: center; padding: 5px; border-radius: 4px;
            font-size: 0.65rem; font-weight: bold;
        }

        /* Ikon-Ikon Mini */
        .copy-icon {
            position: absolute; top: 4px; right: 4px; background: rgba(255,255,255,0.8);
            width: 22px; height: 22px; border-radius: 50%; display: flex;
            align-items: center; justify-content: center; font-size: 9px; cursor: pointer; z-index: 5;
        }

        .admin-controls-mini {
            display: flex; background: #f8f8f8; border-top: 1px solid #eee; padding: 4px; justify-content: space-around;
        }
        .btn-mini-ctrl { background: none; border: none; font-size: 11px; cursor: pointer; color: #666; }

        /* Edit Overlay */
        .edit-card-form { padding: 5px; display: flex; flex-direction: column; gap: 4px; }
        .edit-card-form input { font-size: 10px; padding: 4px; border: 1px solid #ddd; border-radius: 4px; }

        @media (max-width: 350px) {
            .menu-list { grid-template-columns: repeat(2, 1fr); } /* Terlalu sempit di HP jadul jadi 2 */
        }

        footer { padding: 20px; color: #999; font-size: 11px; }
    </style>
</head>
<body>

    <nav class="toolbar">
        <h2 style="font-size: 16px; color: #ee4d2d;">MUZANS AFILIASI</h2>
        <div class="auth-container" id="auth-wrapper">
            <button onclick="toggleLoginForm(event)" id="btn-login-ui" style="background:none; border:1px solid #ddd; padding:5px 10px; border-radius:15px; cursor:pointer; font-size:12px">Login</button>
            <div class="login-popup" id="login-popup">
                <input type="email" id="email" placeholder="Email">
                <input type="password" id="password" placeholder="Password">
                <label class="rem-box"><input type="checkbox" id="rememberMe"> Ingat Saya</label>
                <button class="btn-add" onclick="login()">Masuk</button>
            </div>
            <button id="btn-logout" style="display:none; color:white; background:#ff4757; border:none; padding:6px 12px; border-radius:15px; cursor:pointer; font-size:12px" onclick="logout()">Logout</button>
        </div>
    </nav>

    <div id="admin-panel">
        <input type="text" id="url" class="admin-input" placeholder="Link Shopee (s.shopee.co.id/...)">
        <input type="text" id="title" class="admin-input" placeholder="Nama Produk (Opsional)">
        <input type="text" id="price" class="admin-input" placeholder="Harga (Contoh: Rp10.000)">
        <button class="btn-add" id="publish-btn" onclick="addMenu()">Terbitkan</button>
    </div>

    <div class="container">
        <div id="menu-container" class="menu-list"></div>
    </div>

    <footer>&copy; 2026 Muzans Dev • 3-Column Mini Layout</footer>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDX5o3n7iQjqcS0ZJsbir_35JOpG7jqkPA",
            authDomain: "link-shopee-bc394.firebaseapp.com",
            projectId: "link-shopee-bc394",
            storageBucket: "link-shopee-bc394.firebasestorage.app",
            messagingSenderId: "111837568012",
            appId: "1:111837568012:web:b34dc5675becd8ef896229",
            measurementId: "G-2BLSC5YMS6",
            databaseURL: "https://link-shopee-bc394-default-rtdb.asia-southeast1.firebasedatabase.app"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const auth = firebase.auth();

        let isAdmin = false;
        let menuDataCache = {};
        let editingKey = null;

        // Auto-fill Remember Me
        window.addEventListener('DOMContentLoaded', () => {
            if(localStorage.getItem('muzans_rem') === 'true') {
                document.getElementById('email').value = localStorage.getItem('muzans_email') || '';
                document.getElementById('password').value = localStorage.getItem('muzans_pass') || '';
                document.getElementById('rememberMe').checked = true;
            }
        });

        function toggleLoginForm(event) {
            event.stopPropagation();
            const popup = document.getElementById('login-popup');
            popup.style.display = (popup.style.display === 'flex') ? 'none' : 'flex';
        }

        function login() {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            const rem = document.getElementById('rememberMe').checked;

            auth.signInWithEmailAndPassword(email, pass).then(() => {
                if(rem) {
                    localStorage.setItem('muzans_email', email);
                    localStorage.setItem('muzans_pass', pass);
                    localStorage.setItem('muzans_rem', 'true');
                } else {
                    localStorage.clear();
                }
                document.getElementById('login-popup').style.display = 'none';
            }).catch(() => alert("Gagal Login"));
        }

        function logout() { auth.signOut(); }

        auth.onAuthStateChanged(user => {
            isAdmin = !!user;
            document.getElementById('admin-panel').style.display = isAdmin ? 'block' : 'none';
            document.getElementById('btn-logout').style.display = isAdmin ? 'block' : 'none';
            document.getElementById('btn-login-ui').style.display = isAdmin ? 'none' : 'block';
            renderMenus();
        });

        async function addMenu() {
            const url = document.getElementById('url').value;
            const title = document.getElementById('title').value;
            const price = document.getElementById('price').value;
            const btn = document.getElementById('publish-btn');

            if(!url || !price) return alert("Link dan Harga wajib diisi!");
            
            btn.innerText = "Processing...";
            btn.disabled = true;

            try {
                const response = await fetch(`https://api.microlink.io?url=${encodeURIComponent(url)}`);
                const resData = await response.json();
                const meta = resData.data;

                db.ref('linkshopee').push({
                    title: title || meta.title || "Produk", 
                    url: url,
                    downloadUrl: meta.image ? meta.image.url : "https://via.placeholder.com/200",
                    price: price,
                    createdAt: firebase.database.ServerValue.TIMESTAMP
                }).then(() => {
                    document.getElementById('url').value = "";
                    document.getElementById('title').value = "";
                    document.getElementById('price').value = "";
                });
            } catch (e) {
                alert("Gambar gagal diambil otomatis. Tetap menyimpan.");
                db.ref('linkshopee').push({ title: title || "Produk", url: url, price: price, downloadUrl: "https://via.placeholder.com/200", createdAt: firebase.database.ServerValue.TIMESTAMP });
            } finally {
                btn.innerText = "Terbitkan";
                btn.disabled = false;
            }
        }

        db.ref('linkshopee').on('value', (snap) => {
            menuDataCache = snap.val() || {};
            renderMenus();
        });

        function renderMenus() {
            const container = document.getElementById('menu-container');
            container.innerHTML = "";
            const keys = Object.keys(menuDataCache).reverse();

            keys.forEach((key) => {
                const data = menuDataCache[key];
                const card = document.createElement('div');
                card.className = 'product-card';

                if(isAdmin && editingKey === key) {
                    card.innerHTML = `
                        <div class="edit-card-form">
                            <input type="text" id="ed-t-${key}" value="${data.title}">
                            <input type="text" id="ed-p-${key}" value="${data.price}">
                            <button onclick="saveEdit('${key}')" style="background:green; color:white; border:none; font-size:10px; padding:3px;">Simpan</button>
                            <button onclick="setEdit(null)" style="background:gray; color:white; border:none; font-size:10px; padding:3px;">Batal</button>
                        </div>`;
                } else {
                    card.innerHTML = `
                        <div class="copy-icon" onclick="copyToClipboard('${data.url}')"><i class="fa-regular fa-copy"></i></div>
                        <div class="img-container">
                            <img src="${data.downloadUrl}" onerror="this.src='https://via.placeholder.com/200'">
                        </div>
                        <div class="product-info">
                            <div class="product-name">${data.title}</div>
                            <div class="product-price">${data.price}</div>
                            <a href="${data.url}" target="_blank" class="btn-buy">BELI</a>
                        </div>
                        ${isAdmin ? `
                        <div class="admin-controls-mini">
                            <button class="btn-mini-ctrl" onclick="setEdit('${key}')"><i class="fa-solid fa-pen"></i> Edit</button>
                            <button class="btn-mini-ctrl" style="color:#e74c3c" onclick="deleteMenu('${key}')"><i class="fa-solid fa-trash"></i></button>
                        </div>` : ''}
                    `;
                }
                container.appendChild(card);
            });
        }

        function setEdit(key) { editingKey = key; renderMenus(); }

        function saveEdit(key) {
            const newTitle = document.getElementById(`ed-t-${key}`).value;
            const newPrice = document.getElementById(`ed-p-${key}`).value;
            db.ref('linkshopee/' + key).update({ title: newTitle, price: newPrice })
            .then(() => { editingKey = null; renderMenus(); });
        }

        function copyToClipboard(text) {
            navigator.clipboard.writeText(text).then(() => alert("Link disalin!"));
        }

        function deleteMenu(key) {
            if(confirm("Hapus?")) db.ref('linkshopee/' + key).remove();
        }
    </script>
</body>
</html>
