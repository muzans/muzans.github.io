<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Muzans Afiliasi - Pro Grid</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #f7f7f7; color: #333; }

        /* --- TOOLBAR --- */
        .toolbar {
            width: 100%; background: #fff; padding: 12px 15px;
            display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05); position: sticky; top: 0; z-index: 1000;
        }

        /* --- ADMIN PANEL --- */
        #admin-panel {
            background: white; padding: 20px; border-radius: 15px; margin: 15px auto;
            width: 90%; max-width: 500px; display: none; box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }
        .admin-input { width: 100%; padding: 12px; margin: 6px 0; border: 1px solid #eee; border-radius: 10px; background: #fafafa; outline: none; transition: 0.3s; }
        .admin-input:focus { border-color: #ee4d2d; }
        .btn-add { background: #ee4d2d; color: white; border: none; padding: 12px; border-radius: 10px; cursor: pointer; width: 100%; font-weight: bold; margin-top: 10px; }

        /* --- GRID 3 COLUMN --- */
        .container { width: 100%; max-width: 1000px; padding: 10px; margin: auto; }
        .menu-list { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 8px; 
        }

        .product-card {
            background: white; border-radius: 12px; overflow: hidden;
            box-shadow: 0 2px 6px rgba(0,0,0,0.04); display: flex;
            flex-direction: column; position: relative; border: 1px solid #f0f0f0;
        }

        /* Container gambar tanpa kedipan */
        .img-container { 
            width: 100%; aspect-ratio: 1 / 1; 
            background: #f0f0f0; /* Placeholder warna abu-abu solid */
            position: relative; overflow: hidden; 
        }
        .img-container img { 
            width: 100%; height: 100%; object-fit: cover; 
            display: block; /* Menghilangkan gap bawah */
        }

        .product-info { padding: 8px; display: flex; flex-direction: column; flex-grow: 1; }
        .product-name { 
            font-size: 0.75rem; font-weight: 500; color: #444; line-height: 1.3;
            display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
            overflow: hidden; margin-bottom: 4px; min-height: 2.6em;
        }
        .product-price { color: #ee4d2d; font-size: 0.85rem; font-weight: 700; margin-bottom: 8px; }
        
        .btn-buy {
            background: #ee4d2d; color: white; text-decoration: none;
            text-align: center; padding: 6px; border-radius: 6px;
            font-size: 0.7rem; font-weight: bold;
        }

        /* --- POPUP EDIT (MODAL) --- */
        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); z-index: 2000; justify-content: center; align-items: center;
        }
        .modal-content {
            background: white; padding: 25px; border-radius: 20px; width: 90%; max-width: 400px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.2); position: relative;
        }
        .modal-content h3 { margin-bottom: 15px; font-size: 18px; color: #ee4d2d; }

        /* Admin Controls */
        .admin-controls { display: flex; justify-content: space-around; background: #fafafa; padding: 6px; border-top: 1px solid #eee; }
        .btn-ctrl { background: none; border: none; font-size: 12px; cursor: pointer; color: #777; transition: 0.2s; }
        .btn-ctrl:hover { color: #ee4d2d; }

        .copy-icon {
            position: absolute; top: 6px; right: 6px; background: rgba(255,255,255,0.9);
            width: 24px; height: 24px; border-radius: 50%; display: flex;
            align-items: center; justify-content: center; font-size: 10px; z-index: 10; cursor: pointer;
        }

        @media (max-width: 480px) { .menu-list { grid-template-columns: repeat(3, 1fr); } }
    </style>
</head>
<body>

    <nav class="toolbar">
        <h2 style="font-size: 16px; color: #ee4d2d;">MUZANS AFILIASI</h2>
        <div id="auth-wrapper">
            <button id="btn-login-ui" onclick="toggleLogin()" style="background:none; border:1px solid #ddd; padding:6px 15px; border-radius:20px; font-size:12px; cursor:pointer;">Admin</button>
            <button id="btn-logout" style="display:none; color:white; background:#ff4757; border:none; padding:8px 15px; border-radius:20px; cursor:pointer; font-size:12px" onclick="logout()">Logout</button>
        </div>
    </nav>

    <div id="login-modal" class="modal">
        <div class="modal-content">
            <h3>Login Admin</h3>
            <input type="email" id="email" class="admin-input" placeholder="Email">
            <input type="password" id="password" class="admin-input" placeholder="Password">
            <button class="btn-add" onclick="login()">Masuk</button>
            <button class="btn-add" style="background:#ccc; margin-top:5px" onclick="toggleLogin()">Batal</button>
        </div>
    </div>

    <div id="admin-panel">
        <input type="text" id="url" class="admin-input" placeholder="Link Shopee">
        <input type="text" id="title" class="admin-input" placeholder="Nama Produk">
        <input type="text" id="price" class="admin-input" placeholder="Harga (Contoh: Rp10.000)">
        <input type="text" id="imgLink" class="admin-input" placeholder="Link Gambar Manual">
        <button class="btn-add" onclick="addMenu()">Terbitkan</button>
    </div>

    <div class="container">
        <div id="menu-container" class="menu-list"></div>
    </div>

    <div id="edit-modal" class="modal">
        <div class="modal-content">
            <h3>Edit Produk</h3>
            <input type="text" id="edit-url" class="admin-input" placeholder="Link Shopee">
            <input type="text" id="edit-title" class="admin-input" placeholder="Nama Produk">
            <input type="text" id="edit-price" class="admin-input" placeholder="Harga">
            <input type="text" id="edit-img" class="admin-input" placeholder="Link Gambar">
            <button class="btn-add" onclick="saveEdit()">Simpan Perubahan</button>
            <button class="btn-add" style="background:#999; margin-top:5px" onclick="closeEditModal()">Batal</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDX5o3n7iQjqcS0ZJsbir_35JOpG7jqkPA",
            authDomain: "link-shopee-bc394.firebaseapp.com",
            projectId: "link-shopee-bc394",
            storageBucket: "link-shopee-bc394.firebasestorage.app",
            messagingSenderId: "111837568012",
            appId: "1:111837568012:web:b34dc5675becd8ef896229",
            measurementId: "G-2BLSC5YMS6",
            databaseURL: "https://link-shopee-bc394-default-rtdb.asia-southeast1.firebasedatabase.app"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const auth = firebase.auth();

        let isAdmin = false;
        let editingKey = null;

        function toggleLogin() {
            const m = document.getElementById('login-modal');
            m.style.display = (m.style.display === 'flex') ? 'none' : 'flex';
        }

        function login() {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            auth.signInWithEmailAndPassword(email, pass).then(() => {
                toggleLogin();
            }).catch(() => alert("Gagal Login"));
        }

        function logout() { auth.signOut(); }

        auth.onAuthStateChanged(user => {
            isAdmin = !!user;
            document.getElementById('admin-panel').style.display = isAdmin ? 'block' : 'none';
            document.getElementById('btn-logout').style.display = isAdmin ? 'block' : 'none';
            document.getElementById('btn-login-ui').style.display = isAdmin ? 'none' : 'block';
            renderMenus();
        });

        function addMenu() {
            const url = document.getElementById('url').value;
            const title = document.getElementById('title').value;
            const price = document.getElementById('price').value;
            const imgLink = document.getElementById('imgLink').value;

            if(!url || !title || !price || !imgLink) return alert("Isi semua data!");

            db.ref('linkshopee').push({
                title, url, downloadUrl: imgLink, price,
                createdAt: firebase.database.ServerValue.TIMESTAMP
            }).then(() => {
                document.getElementById('url').value = "";
                document.getElementById('title').value = "";
                document.getElementById('price').value = "";
                document.getElementById('imgLink').value = "";
            });
        }

        db.ref('linkshopee').on('value', snap => {
            const data = snap.val() || {};
            renderMenus(data);
        });

        function renderMenus(dataCache) {
            const data = dataCache || {};
            const container = document.getElementById('menu-container');
            container.innerHTML = "";
            const keys = Object.keys(data).reverse();

            keys.forEach(key => {
                const item = data[key];
                const card = document.createElement('div');
                card.className = 'product-card';
                card.innerHTML = `
                    <div class="copy-icon" onclick="copyToClipboard('${item.url}')"><i class="fa-regular fa-copy"></i></div>
                    <div class="img-container">
                        <img src="${item.downloadUrl}" loading="lazy" onerror="this.src='https://via.placeholder.com/200?text=Error'">
                    </div>
                    <div class="product-info">
                        <div class="product-name">${item.title}</div>
                        <div class="product-price">${item.price || 'Rp -'}</div>
                        <a href="${item.url}" target="_blank" class="btn-buy">BELI</a>
                    </div>
                    ${isAdmin ? `
                    <div class="admin-controls">
                        <button class="btn-ctrl" onclick="openEditModal('${key}')"><i class="fa-solid fa-pen"></i> Edit</button>
                        <button class="btn-ctrl" style="color:#ff4757" onclick="deleteMenu('${key}')"><i class="fa-solid fa-trash"></i></button>
                    </div>` : ''}
                `;
                container.appendChild(card);
            });
        }

        // FUNGSI MODAL EDIT
        function openEditModal(key) {
            editingKey = key;
            db.ref('linkshopee/' + key).once('value', snap => {
                const val = snap.val();
                document.getElementById('edit-title').value = val.title;
                document.getElementById('edit-price').value = val.price;
                document.getElementById('edit-url').value = val.url;
                document.getElementById('edit-img').value = val.downloadUrl;
                document.getElementById('edit-modal').style.display = 'flex';
            });
        }

        function closeEditModal() {
            document.getElementById('edit-modal').style.display = 'none';
            editingKey = null;
        }

        function saveEdit() {
            if(!editingKey) return;
            const updates = {
                title: document.getElementById('edit-title').value,
                price: document.getElementById('edit-price').value,
                url: document.getElementById('edit-url').value,
                downloadUrl: document.getElementById('edit-img').value
            };
            db.ref('linkshopee/' + editingKey).update(updates).then(() => {
                closeEditModal();
            });
        }

        function copyToClipboard(text) {
            navigator.clipboard.writeText(text).then(() => alert("Link disalin!"));
        }

        function deleteMenu(key) {
            if(confirm("Hapus produk?")) db.ref('linkshopee/' + key).remove();
        }
    </script>
</body>
</html>
