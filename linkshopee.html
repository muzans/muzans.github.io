<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Muzans Developer - Link Shopee</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/faker/5.5.3/faker.min.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, sans-serif; }

        body {
            min-height: 100vh;
            background: #f0f2f5; 
            display: flex; flex-direction: column; align-items: center;
        }

        /* --- MAIN CONTAINER --- */
        .main-container {
            width: 95%; max-width: 500px;
            background: #ffffff;
            border-radius: 20px;
            padding: 30px 20px;
            margin: 25px 0; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
            display: flex; flex-direction: column;
        }

        .section-title {
            text-align: center; color: #444; 
            font-size: 1.4em; font-weight: 700; 
            margin-bottom: 25px;
        }

        /* --- GENERATOR SECTION --- */
        .input-generator {
            width: 100%; padding: 16px;
            border: 1px solid #ddd; border-radius: 12px;
            text-align: center; outline: none; font-size: 0.95em;
            color: #333; font-weight: 500; background: #fdfdfd;
            margin-bottom: 12px;
        }

        .btn-acak {
            width: 100%; background: #54a0ff; color: white; 
            border: none; padding: 16px; border-radius: 12px; 
            font-size: 1.05em; font-weight: bold; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 8px;
            margin-bottom: 30px; transition: 0.3s;
        }
        .btn-acak:hover { background: #2e86de; }

        /* --- MENU CARDS --- */
        .menu-list { display: flex; flex-direction: column; gap: 12px; }
        
        .menu-wrapper { position: relative; width: 100%; }

        .menu-item {
            display: flex; width: 100%; min-height: 75px;
            border-radius: 12px; overflow: hidden;
            box-shadow: 0 2px 5px rgba(0,0,0,0.08);
            transition: transform 0.2s;
        }
        .menu-item:active { transform: scale(0.98); }

        /* Tombol Salin Kiri (1/5 atau 20%) */
        .menu-copy {
            width: 20%; 
            background: rgba(0, 0, 0, 0.15);
            display: flex; align-items: center; justify-content: center;
            color: white; font-size: 1.3em; cursor: pointer;
        }
        .menu-copy:hover { background: rgba(0, 0, 0, 0.25); }

        /* Area Konten Kanan (80%) */
        .menu-content {
            width: 80%; padding: 15px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            text-decoration: none; color: white; text-align: center; gap: 6px;
        }

        .menu-title { font-weight: 600; font-size: 0.9em; text-transform: uppercase; }
        
        .badge-container { display: flex; gap: 6px; align-items: center; justify-content: center; }
        
        .badge {
            font-size: 0.75em; font-weight: 600; background: rgba(0, 0, 0, 0.2);
            padding: 3px 10px; border-radius: 12px;
        }
        
        .badge-new { position: absolute; top: -5px; right: -5px; background: #ff4757; color: white; font-size: 9px; padding: 3px 8px; border-radius: 10px; font-weight: bold; border: 2px solid white; z-index: 2; }

    </style>
</head>
<body>

    <div class="main-container">
        
        <div class="section-title">LINK SHOPEE</div>

        <input type="text" id="generatedDataOutput" class="input-generator" placeholder="-----" readonly>
        
        <button id="btn-generate" class="btn-acak" onclick="generateAndCopyData()">
            <i class="fa-solid fa-shuffle"></i> Acak Data
        </button>

        <div id="menu-container" class="menu-list"></div>

    </div>

    <script>
        // ==========================================
        // FUNGSI COPY SENYAP UMUM
        // ==========================================
        async function copyToClipboard(text) {
            if (!text) return;
            try {
                if (navigator.clipboard && window.isSecureContext) {
                    await navigator.clipboard.writeText(text);
                } else {
                    throw new Error("Fallback");
                }
            } catch (err) {
                const textArea = document.createElement("textarea");
                textArea.value = text;
                textArea.style.position = "fixed";
                textArea.style.left = "-9999px";
                document.body.appendChild(textArea);
                textArea.focus();
                textArea.select();
                document.execCommand('copy');
                document.body.removeChild(textArea);
            }
        }

        // ==========================================
        // KONFIGURASI FIREBASE
        // ==========================================
        const firebaseConfig = {
            apiKey: "AIzaSyDX5o3n7iQjqcS0ZJsbir_35JOpG7jqkPA",
            authDomain: "link-shopee-bc394.firebaseapp.com",
            projectId: "link-shopee-bc394",
            storageBucket: "link-shopee-bc394.firebasestorage.app",
            messagingSenderId: "111837568012",
            appId: "1:111837568012:web:b34dc5675becd8ef896229",
            measurementId: "G-2BLSC5YMS6",
            databaseURL: "https://link-shopee-bc394-default-rtdb.asia-southeast1.firebasedatabase.app"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // ==========================================
        // LOGIKA ACAK PROFIL & AUTO-CLEANUP (WIB)
        // ==========================================
        let firebaseUsedNames = [];
        
        const wibDate = new Date(new Date().toLocaleString("en-US", {timeZone: "Asia/Jakarta"}));
        const todayWIB = `${wibDate.getFullYear()}-${String(wibDate.getMonth() + 1).padStart(2, '0')}-${String(wibDate.getDate()).padStart(2, '0')}`;

        // FITUR PEMBERSIH OTOMATIS
        db.ref('used_names').once('value', (snap) => {
            if (snap.exists()) {
                snap.forEach((childSnap) => {
                    if (childSnap.key !== todayWIB) {
                        db.ref('used_names/' + childSnap.key).remove();
                    }
                });
            }
        });

        // PANTAU DATA HARI INI
        db.ref('used_names/' + todayWIB).on('value', (snap) => {
            firebaseUsedNames = snap.val() ? Object.values(snap.val()) : [];
        });

        async function generateAndCopyData() {
            try {
                if(!window.faker) {
                    alert("Sistem pengacak sedang dimuat, harap tunggu beberapa detik.");
                    return;
                }
                window.faker.locale = "id_ID";

                let nama = ""; let batasMaksimal = 0; 
                do {
                    nama = window.faker.name.findName();
                    batasMaksimal++;
                } while (firebaseUsedNames.includes(nama) && batasMaksimal < 150);

                db.ref('used_names/' + todayWIB).push(nama);

                const prefixProvider = ['0811', '0812', '0813', '0821', '0822', '0852', '0815', '0816', '0857', '0858', '0817', '0818', '0819', '0859', '0877', '0878', '0895', '0896', '0897', '0898', '0881', '0882', '0887', '0888'];
                const prefix = prefixProvider[Math.floor(Math.random() * prefixProvider.length)];
                const noHp = prefix + Math.floor(Math.random() * 100000000).toString().padStart(8, '0');
                
                const daerah = [
                    { prov: "DKI JAKARTA", zip: "1", weight: 30, kota: ["JAKARTA SELATAN", "JAKARTA PUSAT", "JAKARTA BARAT", "JAKARTA TIMUR"] },
                    { prov: "JAWA BARAT", zip: "4", weight: 35, kota: ["BANDUNG", "BOGOR", "BEKASI", "DEPOK", "CIREBON", "GARUT"] },
                    { prov: "JAWA TENGAH", zip: "5", weight: 30, kota: ["SEMARANG", "SURAKARTA", "MAGELANG", "CILACAP", "KUDUS"] },
                    { prov: "JAWA TIMUR", zip: "6", weight: 35, kota: ["SURABAYA", "MALANG", "SIDOARJO", "GRESIK", "JEMBER"] },
                    { prov: "BALI", zip: "8", weight: 15, kota: ["DENPASAR", "BADUNG", "GIANYAR"] },
                    { prov: "SUMATERA UTARA", zip: "2", weight: 15, kota: ["MEDAN", "BINJAI", "DELI SERDANG"] },
                    { prov: "SULAWESI SELATAN", zip: "9", weight: 12, kota: ["MAKASSAR", "GOWA", "MAROS"] }
                ];

                let totalWeight = daerah.reduce((sum, item) => sum + item.weight, 0);
                let randomNum = Math.random() * totalWeight;
                let pilihDaerah = daerah[0];
                for (let d of daerah) {
                    if (randomNum < d.weight) { pilihDaerah = d; break; }
                    randomNum -= d.weight;
                }

                const kota = pilihDaerah.kota[Math.floor(Math.random() * pilihDaerah.kota.length)];
                const kodePos = `${pilihDaerah.zip}${Math.floor(Math.random() * 10000).toString().padStart(4, '0')}`;
                
                const jalanList = ["JL. JENDERAL SUDIRMAN", "JL. GATOT SUBROTO", "JL. AHMAD YANI", "JL. MERDEKA", "JL. DIPONEGORO", "JL. PAHLAWAN", "JL. MELATI", "JL. ANGGREK", "JL. NUSA INDAH"];
                const jalan = `${jalanList[Math.floor(Math.random() * jalanList.length)]} NO. ${Math.floor(Math.random() * 200) + 1}`;
                
                const patokanList = ["Samping Masjid", "Depan Indomaret", "Sebelah SD", "Belakang Pasar", "Samping Apotek", "Pas Tikungan", "Rumah Pagar Hitam"];
                const patokan = patokanList[Math.floor(Math.random() * patokanList.length)].toUpperCase();

                const hasilLengkap = `${nama}, ${noHp}, ${pilihDaerah.prov}, ${kota}, ${kodePos}, ${jalan} (${patokan})`;
                
                const outputEl = document.getElementById('generatedDataOutput');
                outputEl.value = hasilLengkap;
                await copyToClipboard(hasilLengkap);

                const btn = document.getElementById('btn-generate');
                const originalHTML = '<i class="fa-solid fa-shuffle"></i> Acak Data';
                btn.innerHTML = '<i class="fa-solid fa-check"></i> Tersalin!';
                btn.style.background = '#2ecc71';
                setTimeout(() => { 
                    btn.innerHTML = originalHTML; 
                    btn.style.background = '#54a0ff';
                }, 1500);

            } catch (err) { console.error(err); }
        }

        // ==========================================
        // RENDER KARTU MENU DARI FIREBASE
        // ==========================================
        async function copyCardUrl(url, element) {
            await copyToClipboard(url);
            const icon = element.querySelector('i');
            icon.className = 'fa-solid fa-check';
            setTimeout(() => { icon.className = 'fa-regular fa-copy'; }, 1000);
        }

        db.ref('linkshopee').on('value', (snap) => {
            const menuDataCache = snap.val() || {};
            const container = document.getElementById('menu-container');
            container.innerHTML = "";
            
            const colors = ['#ff6b6b', '#54a0ff', '#5f27cd', '#ff9f43', '#2ecc71', '#00d2d3'];
            const keys = Object.keys(menuDataCache).reverse();

            keys.forEach((key, index) => {
                const data = menuDataCache[key];
                const itemDate = data.createdAt ? new Date(data.createdAt) : new Date();
                const isNew = Math.ceil(Math.abs(new Date() - itemDate) / (1000 * 60 * 60 * 24)) <= 7;
                
                let statusLabel = data.status ? String(data.status).toUpperCase() : "";
                
                const wrapper = document.createElement('div');
                wrapper.className = 'menu-wrapper';
                wrapper.innerHTML = `
                    ${isNew ? '<div class="badge-new">NEW</div>' : ''}
                    <div class="menu-item" style="background:${colors[index % colors.length]}">
                        
                        <div class="menu-copy" onclick="copyCardUrl('${data.url}', this)">
                            <i class="fa-regular fa-copy"></i>
                        </div>
                        
                        <a href="${data.url}" target="_blank" class="menu-content">
                            <span class="menu-title">${data.title}</span>
                            ${(statusLabel || data.price) ? `
                            <div class="badge-container">
                                ${statusLabel ? `<span class="badge">${statusLabel}</span>` : ''}
                                ${data.price ? `<span class="badge">${data.price}</span>` : ''}
                            </div>` : ''}
                        </a>

                    </div>
                `;
                container.appendChild(wrapper);
            });
        });
    </script>
</body>
</html>
